apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-usuario-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-usuario
  template:
    metadata:
      labels:
        app: ms-usuario
    spec:
      containers:
        - name: ms-usuario
          image: MS_USUARIO_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres:5432/gymstore_db"
            - name: DB_USER
              value: "POSTGRES_USER_PLACEHOLDER"
            - name: DB_PASSWORD
              value: "POSTGRES_PASSWORD_PLACEHOLDER"
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: ms-usuario-service
spec:
  type: LoadBalancer
  selector:
    app: ms-usuario
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
