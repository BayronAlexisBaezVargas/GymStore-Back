name: CI/CD Pipeline - GymStore API

# Se ejecuta al hacer Push o Pull Request hacia las ramas principales
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ==========================================
  # 1. PRUEBAS Y ENTORNO SIMULADO (IE2, IE4)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Levantar Base de Datos de Prueba (Docker Compose)
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: docker compose up -d db

      - name: Ejecutar Pruebas de Maven
        env:
          # Para las pruebas, la API (que corre en la máquina virtual)
          # se conecta al puerto expuesto por el contenedor de BD
          DB_URL: jdbc:postgresql://localhost:5432/gymstore_db
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean test

  # ==========================================
  # 2. ANÁLISIS DE CÓDIGO CON SONARCLOUD (IE3)
  # ==========================================
  security-sonar:
    needs: build-and-test # Espera a que pasen las pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para que Sonar analice el historial

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Escaneo de Calidad con SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token automático de GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=${{ secrets.PROJECT_KEY_SONAR }} 
          -Dsonar.organization=${{ secrets.ORGANIZATION_SONAR }} 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
          -DskipTests # Saltamos las pruebas porque ya corrieron en el job anterior

  # ==========================================
  # 3. ESCANEO DE VULNERABILIDADES CON SNYK (IE3)
  # ==========================================
  security-snyk:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Análisis de Dependencias con Snyk
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # Esto bloquea el pipeline si encuentra vulnerabilidades de nivel ALTO o CRÍTICO
          args: --severity-threshold=high

  # ==========================================
  # 4. ENTREGA CONTINUA A DOCKER HUB (IE1, IE4)
  # ==========================================
  docker-publish:
    needs: [security-sonar, security-snyk] # Solo sube la imagen si el código es seguro
    if: github.ref == 'refs/heads/main' # CONDICIÓN CLAVE: Solo en main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Etiqueta la imagen con tu usuario y el nombre de la app
          tags: ${{ secrets.DOCKER_USERNAME }}/gymstore-api:latest