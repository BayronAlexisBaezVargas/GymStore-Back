name: CI/CD Pipeline - GymStore API

# Se ejecuta SOLO al hacer Push (merge) hacia la rama 'main'
on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 1. PRUEBAS Y ENTORNO SIMULAD
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Levantar Base de Datos de Prueba (Docker Compose)
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: docker compose up -d db

      - name: Ejecutar Pruebas de Maven
        env:
          DB_URL: jdbc:postgresql://localhost:5432/gymstore_db
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean test

  # ==========================================
  # 2. ANÁLISIS DE CÓDIGO CON SONARCLOUD
  # ==========================================
  security-sonar:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Escaneo de Calidad con SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=${{ secrets.PROJECT_KEY_SONAR }} 
          -Dsonar.organization=${{ secrets.ORGANIZATION_SONAR }} 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
          -DskipTests

  # ==========================================
  # 3. ESCANEO DE VULNERABILIDADES CON SNYK
  # ==========================================
  security-snyk:
    needs: build-and-test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Análisis de Dependencias con Snyk
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # SOLO argumentos de severidad. Nada de archivos .snyk.
          # Si Snyk encuentra vulnerabilidades, esto fallará POR SEGURIDAD, no por error de archivo.
          args: --severity-threshold=high --json-file-output=snyk-report.json

      - name: Guardar Reporte de Snyk como Artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-security-report
          path: snyk-report.json

  # ==========================================
  # 4. ENTREGA CONTINUA A DOCKER HUB
  # ==========================================
  docker-publish:
    needs: [security-sonar, security-snyk]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: bayronbaez
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: bayronbaez/gymstore-api:latest