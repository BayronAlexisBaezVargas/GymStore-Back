name: CI/CD Pipeline - GymStore API

# Se ejecuta SOLO al hacer Push (merge) hacia la rama 'main'
on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 1. PRUEBAS Y ENTORNO SIMULADO
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Levantar Base de Datos de Prueba (Docker Compose)
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: docker compose up -d db

      - name: Ejecutar Pruebas de Maven (Catálogo)
        working-directory: ./gym-api
        env:
          DB_URL: jdbc:postgresql://localhost:5432/gymstore_db
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean test

      - name: Ejecutar Pruebas de Maven (Usuarios)
        working-directory: ./ms-usuario
        env:
          DB_URL: jdbc:postgresql://localhost:5432/gymstore_db
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean test

  # ==========================================
  # 2. ANÁLISIS DE CÓDIGO CON SONARCLOUD
  # ==========================================
  security-sonar:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Escaneo de Calidad con SonarQube (Catálogo)
        working-directory: ./gym-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=${{ secrets.PROJECT_KEY_SONAR }} 
          -Dsonar.organization=${{ secrets.ORGANIZATION_SONAR }} 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
          -DskipTests

      - name: Escaneo de Calidad con SonarQube (Usuarios)
        working-directory: ./ms-usuario
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=${{ secrets.PROJECT_KEY_SONAR }} 
          -Dsonar.organization=${{ secrets.ORGANIZATION_SONAR }} 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
          -DskipTests
        continue-on-error: true

  # ==========================================
  # 3. ESCANEO DE VULNERABILIDADES CON SNYK
  # ==========================================
  security-snyk:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Análisis de Dependencias con Snyk (Catálogo)
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=gym-api/pom.xml --severity-threshold=high --json-file-output=snyk-report-api.json

      - name: Análisis de Dependencias con Snyk (Usuarios)
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ms-usuario/pom.xml --severity-threshold=high --json-file-output=snyk-report-user.json

      - name: Guardar Reportes de Snyk como Artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-security-reports
          path: |
            snyk-report-api.json
            snyk-report-user.json

  # ==========================================
  # 4A. ENTREGA CONTINUA A DOCKER HUB
  # ==========================================
  docker-publish:
    needs: [security-sonar, security-snyk]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compilar artefactos (Catálogo y Usuarios)
        run: |
          cd gym-api && mvn clean package -DskipTests
          cd ../ms-usuario && mvn clean package -DskipTests

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen Docker (Catálogo)
        uses: docker/build-push-action@v5
        with:
          context: ./gym-api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymstore-api:latest

      - name: Construir y Subir Imagen Docker (Usuarios)
        uses: docker/build-push-action@v5
        with:
          context: ./ms-usuario
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymstore-user-api:latest

  # ==========================================
  # 5. DESPLIEGUE A EC2 USANDO SSH (FALLBACK SEGURO)
  # ==========================================
  deploy-ec2-ssh:
    needs: docker-publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar docker-compose.yml a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ec2-user/"

      - name: Ejecutar despliegue en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user
            
            # Cambiar 'build' por las imágenes reales de Docker Hub
            sed -i "s|build: ./gym-api|image: ${{ secrets.DOCKER_USERNAME }}/gymstore-api:latest|g" docker-compose.yml
            sed -i "s|build: ./ms-usuario|image: ${{ secrets.DOCKER_USERNAME }}/gymstore-user-api:latest|g" docker-compose.yml
            
            export DB_USER="${{ secrets.DB_USER }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            
            # Iniciar sesión en DockerHub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Bajar imágenes actualizadas y levantar el servicio
            docker-compose pull
            docker-compose up -d --remove-orphans
            
            # Limpiar imágenes antiguas
            docker image prune -af
