name: CI/CD Pipeline - GymStore API

# Se ejecuta SOLO al hacer Push (merge) hacia la rama 'main'
on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 1. PRUEBAS Y ENTORNO SIMULADO
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Levantar Base de Datos de Prueba (Docker Compose)
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: docker compose up -d db

      - name: Ejecutar Pruebas de Maven (Catálogo)
        working-directory: ./gym-api
        env:
          DB_URL: jdbc:postgresql://localhost:5432/gymstore_db
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean test

      - name: Ejecutar Pruebas de Maven (Usuarios)
        working-directory: ./ms-usuario
        env:
          DB_URL: jdbc:postgresql://localhost:5432/gymstore_db
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean test

  # ==========================================
  # 2. ANÁLISIS DE CÓDIGO CON SONARCLOUD
  # ==========================================
  security-sonar:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Escaneo de Calidad con SonarQube (Catálogo)
        working-directory: ./gym-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=${{ secrets.PROJECT_KEY_SONAR }} 
          -Dsonar.organization=${{ secrets.ORGANIZATION_SONAR }} 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
          -DskipTests

      - name: Escaneo de Calidad con SonarQube (Usuarios)
        working-directory: ./ms-usuario
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=${{ secrets.PROJECT_KEY_SONAR }} 
          -Dsonar.organization=${{ secrets.ORGANIZATION_SONAR }} 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
          -DskipTests

  # ==========================================
  # 3. ESCANEO DE VULNERABILIDADES CON SNYK
  # ==========================================
  security-snyk:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Análisis de Dependencias con Snyk (Catálogo)
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=gym-api/pom.xml --severity-threshold=high --json-file-output=snyk-report-api.json

      - name: Análisis de Dependencias con Snyk (Usuarios)
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ms-usuario/pom.xml --severity-threshold=high --json-file-output=snyk-report-user.json

      - name: Guardar Reportes de Snyk como Artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-security-reports
          path: |
            snyk-report-api.json
            snyk-report-user.json

  # ==========================================
  # 4A. ENTREGA CONTINUA A AMAZON ECR
  # ==========================================
  docker-publish:
    needs: [security-sonar, security-snyk]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compilar artefactos (Catálogo y Usuarios)
        run: |
          cd gym-api && mvn clean package -DskipTests
          cd ../ms-usuario && mvn clean package -DskipTests

      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir y Subir Imagen ECR (Catálogo)
        run: |
          cd gym-api
          docker build -t 437644723915.dkr.ecr.us-east-1.amazonaws.com/gymstore-api:latest .
          docker push 437644723915.dkr.ecr.us-east-1.amazonaws.com/gymstore-api:latest

      - name: Construir y Subir Imagen ECR (Usuarios)
        run: |
          cd ms-usuario
          docker build -t 437644723915.dkr.ecr.us-east-1.amazonaws.com/gymstore-user-api:latest .
          docker push 437644723915.dkr.ecr.us-east-1.amazonaws.com/gymstore-user-api:latest

  # ==========================================
  # 5. DESPLIEGUE A EC2 USANDO KUBERNETES (K3S)
  # ==========================================
  deploy-ec2-ssh:
    needs: docker-publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar manifiestos K8s a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/*"
          target: "/home/ec2-user/"

      - name: Ejecutar despliegue en Kubernetes (K3s)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user
            export KUBECONFIG=/home/ec2-user/.kube/config
            
            # Reemplazar variables en los manifiestos
            sed -i "s|POSTGRES_USER_PLACEHOLDER|${{ secrets.DB_USER }}|g" k8s/*.yaml
            sed -i "s|POSTGRES_PASSWORD_PLACEHOLDER|${{ secrets.DB_PASSWORD }}|g" k8s/*.yaml
            
            # Generar secreto de ECR en Kubernetes para descargar la imagen
            # Usa el rol LabInstanceProfile de la instancia para obtener el token
            aws ecr get-login-password --region us-east-1 | kubectl create secret docker-registry ecr-secret \
              --docker-server=437644723915.dkr.ecr.us-east-1.amazonaws.com \
              --docker-username=AWS \
              --docker-password-stdin \
              --dry-run=client -o yaml | kubectl apply -f -
            
            # Eliminar recursos anteriores (borrón y cuenta nueva)
            kubectl delete -f k8s/ --ignore-not-found=true
            sleep 10
            
            # Aplicar los nuevos manifiestos
            kubectl apply -f k8s/
            
            # Limpiar imágenes antiguas
            sudo k3s crictl rmi --prune || true
