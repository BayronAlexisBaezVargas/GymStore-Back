spring.application.name=ms-usuario

# Configuración Base de Datos (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gymstore_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Config (256-bit secret key)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Puerto por defecto para este microservicio
server.port=8081

# Ocultar la advertencia inofensiva de Spring Security sobre AuthenticationProvider
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
